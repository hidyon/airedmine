<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Airedmaine</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Redmine client</p>
          <h1>Airedmaine</h1>
        </div>
        <nav class="nav-list" aria-label="Primary">
          <button class="nav-item active" type="button">チケット</button>
          <button class="nav-item" type="button">サマリ</button>
          <button class="nav-item" type="button">設定</button>
        </nav>
        <div class="connection-card" id="connectionStatus">接続確認中</div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Assigned to me</p>
            <h2>今日見るチケット</h2>
          </div>
          <button class="icon-button" id="refreshButton" type="button" aria-label="更新" title="更新">
            <span aria-hidden="true">↻</span>
          </button>
        </header>

        <section class="setup-panel" id="setupPanel" aria-live="polite"></section>

        <section class="metrics" id="metrics"></section>

        <section class="toolbar" aria-label="Filters">
          <label class="search-box">
            <span>検索</span>
            <input id="searchInput" type="search" placeholder="件名、プロジェクト、状態">
          </label>
          <label class="select-box">
            <span>状態</span>
            <select id="statusFilter">
              <option value="open">未完了</option>
              <option value="*">すべて</option>
              <option value="closed">完了</option>
            </select>
          </label>
        </section>

        <section class="issue-list" id="issueList" aria-live="polite"></section>
      </main>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
