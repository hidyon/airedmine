<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AIRedmine</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">AI Redmine client</p>
          <h1>AIRedmine</h1>
        </div>
        <nav class="nav-list" aria-label="Primary">
          <button class="nav-item active" type="button">チケット</button>
          <button class="nav-item" type="button">サマリ</button>
          <button class="nav-item" type="button">設定</button>
        </nav>
        <div class="connection-card" id="connectionStatus">接続確認中</div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Assigned to me</p>
            <h2>今日見るチケット</h2>
          </div>
          <button class="icon-button" id="refreshButton" type="button" aria-label="更新" title="更新">
            <span aria-hidden="true">↻</span>
          </button>
        </header>

        <section class="setup-panel" id="setupPanel" aria-live="polite"></section>

        <section class="metrics" id="metrics"></section>

        <section class="chat-panel" aria-labelledby="chatTitle">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Natural language</p>
              <h3 id="chatTitle">AIRedmine に聞く</h3>
            </div>
          </div>
          <form class="chat-form" id="chatForm">
            <label class="chat-input">
              <span>質問</span>
              <input id="chatInput" type="text" placeholder="今日まず何からやればいい？">
            </label>
            <button class="primary-button" type="submit">聞く</button>
          </form>
          <div class="quick-questions" aria-label="質問例">
            <button type="button" data-question="今日まず何からやればいい？">今日の作業</button>
            <button type="button" data-question="今週のリスクを教えて">リスク</button>
            <button type="button" data-question="次の定例で話すべきことをまとめて">定例</button>
            <button type="button" data-question="この実装が終わったのでRedmineコメント案を書いて">更新案</button>
          </div>
          <div class="chat-output" id="chatOutput" aria-live="polite">
            <div class="empty-state">Redmine issue と docs の知識ベースについて質問できます。</div>
          </div>
        </section>

        <section class="work-guide-panel" aria-labelledby="workGuideTitle">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Agent work guide</p>
              <h3 id="workGuideTitle">今日の作業候補</h3>
            </div>
          </div>
          <div class="work-guide" id="workGuide"></div>
        </section>

        <section class="pm-panel" aria-labelledby="pmPanelTitle">
          <div class="section-heading">
            <div>
              <p class="eyebrow">PM overview</p>
              <h3 id="pmPanelTitle">プロジェクト観測</h3>
            </div>
          </div>
          <div class="pm-grid" id="pmOverview"></div>
        </section>

        <section class="toolbar" aria-label="Filters">
          <label class="search-box">
            <span>検索</span>
            <input id="searchInput" type="search" placeholder="件名、プロジェクト、状態">
          </label>
          <label class="select-box">
            <span>状態</span>
            <select id="statusFilter">
              <option value="open">未完了</option>
              <option value="*">すべて</option>
              <option value="closed">完了</option>
            </select>
          </label>
        </section>

        <section class="issue-list" id="issueList" aria-live="polite"></section>
      </main>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
