- subject: "打刻画面のオフライン対応を実装する"
  tracker: feature
  status: in_progress
  priority: urgent
  updated_days_ago: 1
  version: sprint3
  description: |
    ServiceWorker を使って打刻データをローカルに一時保存し、ネットワーク復帰後に自動同期する。
    オフライン中の修正打刻は同期タイミングで競合が起きる可能性があるため、楽観的ロックを検討中。
  journals:
    - user: suzuki
      note: "ServiceWorker の Cache Storage API で打刻データをローカル保存する方針にします。オフライン中の修正打刻は同期時に競合が起きる可能性があるため、楽観的ロックを検討中です。佐藤さん、同期 API のインターフェースについて相談させてください。"
      days_ago: 4
    - user: sato
      note: "同期エンドポイントは `POST /api/v1/timecards/sync` で対応します。リクエストは `{ records: [...], client_synced_at: ISO8601 }` で、レスポンスは `{ accepted: [...], conflicts: [...] }` です。`conflicts` の UI 表示はどうしますか？"
      days_ago: 3
    - user: suzuki
      note: "競合は「ローカルの打刻時刻」と「サーバー確定値」を並べてユーザーが選べるダイアログにします。モックアップを Figma に共有しました（kintai-next / Sync Conflict Dialog）。来週中に実装します。"
      days_ago: 2

- subject: "打刻時刻のタイムゾーン表示を統一する"
  tracker: task
  status: resolved
  priority: high
  updated_days_ago: 3
  version: sprint2
  description: |
    打刻一覧・詳細・CSV エクスポートで日本標準時（JST）の表示が統一されていない。
    フロントエンド側で `date-fns-tz` を用いて一元管理する。
  journals:
    - user: yamada
      note: "QA 確認でステージング上の打刻一覧が UTC 表示になっているケースを発見しました。CSV エクスポートは JST になっているので、表示の不整合が起きています。"
      days_ago: 7
    - user: suzuki
      note: "原因は `<DateDisplay>` コンポーネントが `toLocaleDateString()` をタイムゾーン指定なしで使っていたためです。`date-fns-tz` の `formatInTimeZone` に統一して修正しました（PR #187）。CSV は既存のサーバー側変換を維持します。"
      days_ago: 5
    - user: tanaka
      note: "PR 確認しました。`TZ=Asia/Tokyo` の環境変数依存をなくして明示的に `Asia/Tokyo` を渡しているのは正しい実装です。マージOKです。"
      days_ago: 4

