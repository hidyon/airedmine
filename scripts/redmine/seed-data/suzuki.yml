- subject: "フロントエンドの TypeScript strict モードに移行する"
  tracker: task
  status: in_progress
  priority: normal
  updated_days_ago: 3
  version: sprint3
  description: |
    `tsconfig.json` の `"strict": true` を有効化し、潜在的な型エラーを排除する。
    現在 87 件の型エラーが出ており、段階的に修正する。
  journals:
    - user: suzuki
      note: "strict モードを有効化したところ 87 件の型エラーが出ました。主なカテゴリ: `strictNullChecks` 由来が 52 件、`noImplicitAny` が 35 件。週 20 件ずつ修正していきます。PR は分割して小さくします。"
      days_ago: 6
    - user: tanaka
      note: "進め方は良いです。`as unknown as X` でのキャストは絶対に避けてください。`strictNullChecks` の修正は `?.` オペレーターと `??` を積極的に使うと綺麗に書けます。型定義の修正で API レスポンスの型が変わる場合は佐藤さんと確認してください。"
      days_ago: 5
    - user: suzuki
      note: "了解しました。52 件中 30 件は修正完了です。API レスポンスの型で `id: number | undefined` になっているケースが多く、バックエンドの OpenAPI スキーマが `nullable: true` になっています。佐藤さんに確認して必要に応じてスキーマを修正します。"
      days_ago: 3

