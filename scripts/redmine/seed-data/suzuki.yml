- subject: "フロントエンドのメモリリークを調査する"
  tracker: bug
  status: in_progress
  priority: high
  updated_days_ago: 2
  version: sprint3
  description: |
    長時間使用するとブラウザのメモリ使用量が増え続ける報告がある。
    Chrome DevTools の Memory タブでヒープスナップショットを取り、原因コンポーネントを特定する。
  journals:
    - user: suzuki
      note: "Chrome DevTools でヒープスナップショットを取りました。`EventCalendar` コンポーネントのアンマウント後も WebSocket の接続が残っており、メモリが解放されていません。`useEffect` の cleanup 関数が空になっていることが原因です。"
      days_ago: 4
    - user: tanaka
      note: "WebSocket の cleanup 以外に、`setInterval` や `addEventListener` も cleanup しているか確認してください。`useEffect` の cleanup は原則すべての副作用に書くようにルール化しましょう。ESLint カスタムルールで検出できるかもしれません。"
      days_ago: 3
    - user: suzuki
      note: "EventCalendar の WebSocket cleanup を実装しました。追加で `useEventListener` カスタムフックを作成して、全コンポーネントから `addEventListener` を隠蔽する形にしました。cleanup 漏れが構造的に起きにくくなります。"
      days_ago: 2

