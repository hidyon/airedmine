version: "3.3"

services:
  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
      - ./docs:/project/docs:ro
      - ./README.md:/project/README.md:ro
      - backend-data:/app/data
    ports:
      - "8000:8000"
    environment:
      REDMINE_BASE_URL: http://redmine:3000
      REDMINE_API_KEY: ${REDMINE_API_KEY:-}
      DOCS_ROOT: /project
    depends_on:
      - redmine

  redmine:
    image: redmine:6.0.9-bookworm
    environment:
      REDMINE_DB_POSTGRES: redmine-db
      REDMINE_DB_DATABASE: redmine
      REDMINE_DB_USERNAME: redmine
      REDMINE_DB_PASSWORD: redmine
    ports:
      - "3000:3000"
    volumes:
      - redmine-files:/usr/src/redmine/files
      - ./scripts/redmine:/demo-scripts:ro
    depends_on:
      - redmine-db

  redmine-db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: redmine
      POSTGRES_USER: redmine
      POSTGRES_PASSWORD: redmine
    volumes:
      - redmine-db-data:/var/lib/postgresql/data

volumes:
  redmine-files:
  redmine-db-data:
  backend-data:
